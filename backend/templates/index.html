<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChekScan - L'OCR Intelligent pour vos Chèques</title>
    
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Specific styles for no-JS version */
        .upload-form { text-align: center; margin-top: 2rem; }
        .upload-input-group { margin: 2rem 0; }
        .upload-input-group input[type="file"] { 
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        .upload-input-group input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #FF4B4B, #FF7B7B);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-right: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header / Navigation -->
    <header class="glass-header">
        <div class="container nav-wrapper">
            <div class="brand-logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="3" />
                        <line x1="2" y1="10" x2="22" y2="10" />
                        <path d="M7 16h8" />
                        <path d="M12 16v-2" />
                    </svg>
                </div>
                <h1>Chek<span>Scan</span></h1>
            </div>
            
            <div class="nav-actions">
                <a href="/" class="btn btn-outline" style="text-decoration: none;">Accueil</a>
            </div>
        </div>
    </header>

    <main class="container main-layout" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        
        <!-- Central Upload Column -->
        <section class="visual-panel" style="max-width: 600px; width: 100%;">
            <div class="stepper">
                <div class="step active">
                    <span class="step-num">1</span>
                    <span class="step-label">Capture</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <span class="step-num">2</span>
                    <span class="step-label">Extraction</span>
                </div>
            </div>

            <!-- Native Native HTML Form for Uploading -->
            <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-form">
                <div class="magic-upload-zone" style="margin-top: 1rem; padding: 3rem 2rem;">
                    <div class="upload-pulse" style="margin: 0 auto 1.5rem auto;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </div>
                    <h3>Soumettre votre chèque</h3>
                    <p class="subtitle">Sélectionnez une image (JPG, PNG)</p>
                    
                    <div class="upload-input-group">
                        <input type="file" name="file" accept="image/*" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-full mt-3">Lancer l'Analyse Tesseract OCR</button>
                    
                    {% if error %}
                    <div class="status-card glass-panel mt-4" style="border-left: 4px solid #FF4B4B;">
                        <p style="color: #FF4B4B; margin:0;">Erreur : {{ error }}</p>
                    </div>
                    {% endif %}
                </div>
            </form>
        </section>

    </main>

</body>
</html>
