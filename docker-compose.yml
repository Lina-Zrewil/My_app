version: '3.8'

services:
  backend:
    build:
      context: ./backend
    # Montons le dossier frontend dans le backend pour que Jinja2 puisse lire les HTML
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
